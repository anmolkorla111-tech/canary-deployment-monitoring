apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-app-main
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: my-app.local
    http:
      paths:
      - path: /
        pathType: ImplementationSpecific
        backend:
          service:
            name: app-service
            port:
              number: 80
